name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          dkp-pacman -Syyu --noconfirm 3ds-curl 3ds-mbedtls 3ds-zlib 3ds-pkg-config
          apt-get update && apt-get install -y wget unzip || true

      - name: Install makerom and bannertool
        run: |
          wget https://github.com/3DSGuy/Project_CTR/releases/download/makerom-v0.18.3/makerom-v0.18.3-ubuntu_x86_64.zip
          unzip makerom-v0.18.3-ubuntu_x86_64.zip
          cp makerom /usr/local/bin/
          chmod +x /usr/local/bin/makerom
          
          wget https://github.com/Steveice10/bannertool/releases/download/1.2.0/bannertool.zip || wget https://github.com/carstene1ns/3ds-bannertool/releases/download/v1.2.0/bannertool.zip
          unzip bannertool.zip
          cp linux-x86_64/bannertool /usr/local/bin/ || cp bannertool /usr/local/bin/
          chmod +x /usr/local/bin/bannertool

      - name: Build
        run: make

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            TriCord.cia
            TriCord.3dsx
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
